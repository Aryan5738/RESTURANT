<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Bistro - Fine Dining Experience</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .glassmorphism-dark {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2340&q=80');
            background-size: cover;
            background-position: center;
        }
        
        .dish-image {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1546039907-7fa05f864c02?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80');
            background-size: cover;
            background-position: center;
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .nav-item {
            transition: all 0.3s ease;
        }
        
        .nav-item:hover {
            transform: translateY(-2px);
        }
        
        .cart-badge {
            top: -8px;
            right: -8px;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // API Base URL
        const API_BASE = './api';
        
        // Auth Helper Functions
        const getToken = () => localStorage.getItem('auth_token');
        const setToken = (token) => localStorage.setItem('auth_token', token);
        const removeToken = () => localStorage.removeItem('auth_token');
        const getUser = () => JSON.parse(localStorage.getItem('user') || 'null');
        const setUser = (user) => localStorage.setItem('user', JSON.stringify(user));
        const removeUser = () => localStorage.removeItem('user');
        
        // API Helper Functions
        const apiCall = async (endpoint, options = {}) => {
            const token = getToken();
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { Authorization: `Bearer ${token}` }),
                ...options.headers
            };
            
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'API Error');
                }
                
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        };
        
        // Cart Helper Functions
        const getCart = () => JSON.parse(localStorage.getItem('cart') || '[]');
        const setCart = (cart) => localStorage.setItem('cart', JSON.stringify(cart));
        const addToCart = (dish) => {
            const cart = getCart();
            const existingItem = cart.find(item => item.id === dish.id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...dish, quantity: 1 });
            }
            
            setCart(cart);
        };
        
        const updateCartQuantity = (dishId, quantity) => {
            const cart = getCart();
            const item = cart.find(item => item.id === dishId);
            
            if (item) {
                if (quantity <= 0) {
                    setCart(cart.filter(item => item.id !== dishId));
                } else {
                    item.quantity = quantity;
                    setCart(cart);
                }
            }
        };
        
        const clearCart = () => setCart([]);
        
        const getCartTotal = () => {
            return getCart().reduce((total, item) => total + (item.price * item.quantity), 0);
        };
        
        const getCartItemCount = () => {
            return getCart().reduce((total, item) => total + item.quantity, 0);
        };
        
        // Components
        const HomePage = () => {
            const [dishes, setDishes] = useState([]);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                fetchFeaturedDishes();
            }, []);
            
            const fetchFeaturedDishes = async () => {
                try {
                    const response = await apiCall('/dishes.php');
                    setDishes(response.dishes.slice(0, 3)); // Show only 3 featured dishes
                } catch (error) {
                    console.error('Error fetching dishes:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            return (
                <div className="pb-20">
                    {/* Hero Section */}
                    <div className="hero-bg min-h-screen flex items-center justify-center">
                        <div className="text-center text-white px-4">
                            <div className="glassmorphism rounded-3xl p-8 max-w-4xl mx-auto animate-float">
                                <h1 className="text-5xl md:text-7xl font-bold mb-6 font-montserrat">
                                    Premium Bistro
                                </h1>
                                <p className="text-xl md:text-2xl mb-8 font-inter opacity-90">
                                    Where culinary artistry meets exceptional dining
                                </p>
                                <button 
                                    onClick={() => window.setCurrentPage('menu')}
                                    className="bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white px-8 py-4 rounded-full text-lg font-semibold transition-all duration-300 transform hover:scale-105"
                                >
                                    Explore Our Menu
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    {/* Featured Dishes */}
                    <div className="container mx-auto px-4 py-16">
                        <h2 className="text-4xl font-bold text-center text-white mb-12 font-montserrat">
                            Featured Dishes
                        </h2>
                        
                        {loading ? (
                            <div className="flex justify-center">
                                <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-white"></div>
                            </div>
                        ) : (
                            <div className="grid md:grid-cols-3 gap-8">
                                {dishes.map(dish => (
                                    <div key={dish.id} className="glassmorphism rounded-2xl p-6 text-white transform hover:scale-105 transition-all duration-300">
                                        <div className="dish-image h-48 rounded-xl mb-4"></div>
                                        <h3 className="text-xl font-semibold mb-2">{dish.name}</h3>
                                        <p className="text-gray-300 mb-4">{dish.description}</p>
                                        <div className="flex justify-between items-center">
                                            <span className="text-2xl font-bold text-yellow-400">${dish.price}</span>
                                            <button 
                                                onClick={() => addToCart(dish)}
                                                className="bg-gradient-to-r from-green-500 to-blue-500 hover:from-green-600 hover:to-blue-600 px-4 py-2 rounded-full transition-all duration-300"
                                            >
                                                Add to Cart
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    
                    {/* About Section */}
                    <div className="container mx-auto px-4 py-16">
                        <div className="glassmorphism rounded-3xl p-12 text-white">
                            <div className="grid md:grid-cols-2 gap-12 items-center">
                                <div>
                                    <h2 className="text-4xl font-bold mb-6 font-montserrat">Our Story</h2>
                                    <p className="text-lg mb-6 leading-relaxed">
                                        At Premium Bistro, we believe that exceptional dining is an art form. 
                                        Our passionate chefs craft each dish with the finest ingredients, 
                                        creating a symphony of flavors that will tantalize your taste buds.
                                    </p>
                                    <p className="text-lg leading-relaxed">
                                        From our farm-to-table philosophy to our commitment to sustainability, 
                                        every aspect of your dining experience is carefully curated to exceed expectations.
                                    </p>
                                </div>
                                <div className="text-center">
                                    <div className="bg-gradient-to-br from-purple-500 to-blue-500 rounded-full w-64 h-64 mx-auto flex items-center justify-center">
                                        <i className="fas fa-utensils text-6xl text-white"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const MenuPage = () => {
            const [dishes, setDishes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [cartItems, setCartItems] = useState(getCart());
            
            useEffect(() => {
                fetchDishes();
            }, []);
            
            const fetchDishes = async () => {
                try {
                    const response = await apiCall('/dishes.php');
                    setDishes(response.dishes);
                } catch (error) {
                    console.error('Error fetching dishes:', error);
                } finally {
                    setLoading(false);
                }
            };
            
            const handleAddToCart = (dish) => {
                addToCart(dish);
                setCartItems(getCart());
                
                // Show success message
                const toast = document.createElement('div');
                toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg z-50';
                toast.textContent = 'Added to cart!';
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 2000);
            };
            
            return (
                <div className="container mx-auto px-4 py-8 pb-20">
                    <h1 className="text-4xl font-bold text-center text-white mb-12 font-montserrat">
                        Our Menu
                    </h1>
                    
                    {loading ? (
                        <div className="flex justify-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-white"></div>
                        </div>
                    ) : (
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {dishes.map(dish => (
                                <div key={dish.id} className="glassmorphism rounded-2xl p-6 text-white transform hover:scale-105 transition-all duration-300">
                                    <div className="dish-image h-48 rounded-xl mb-4"></div>
                                    <h3 className="text-xl font-semibold mb-2">{dish.name}</h3>
                                    <p className="text-gray-300 mb-4 text-sm">{dish.description}</p>
                                    <div className="flex justify-between items-center">
                                        <span className="text-2xl font-bold text-yellow-400">${dish.price}</span>
                                        <button 
                                            onClick={() => handleAddToCart(dish)}
                                            className="bg-gradient-to-r from-green-500 to-blue-500 hover:from-green-600 hover:to-blue-600 px-4 py-2 rounded-full transition-all duration-300 flex items-center gap-2"
                                        >
                                            <i className="fas fa-cart-plus"></i>
                                            Add to Cart
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };
        
        const CartPage = () => {
            const [cartItems, setCartItems] = useState(getCart());
            
            const updateQuantity = (dishId, quantity) => {
                updateCartQuantity(dishId, quantity);
                setCartItems(getCart());
            };
            
            const handleClearCart = () => {
                clearCart();
                setCartItems([]);
            };
            
            const total = getCartTotal();
            
            return (
                <div className="container mx-auto px-4 py-8 pb-20">
                    <h1 className="text-4xl font-bold text-center text-white mb-12 font-montserrat">
                        Your Cart
                    </h1>
                    
                    {cartItems.length === 0 ? (
                        <div className="glassmorphism rounded-2xl p-12 text-center text-white">
                            <i className="fas fa-shopping-cart text-6xl mb-6 opacity-50"></i>
                            <h2 className="text-2xl font-semibold mb-4">Your cart is empty</h2>
                            <p className="text-gray-300 mb-6">Add some delicious dishes to get started!</p>
                            <button 
                                onClick={() => window.setCurrentPage('menu')}
                                className="bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white px-6 py-3 rounded-full transition-all duration-300"
                            >
                                Browse Menu
                            </button>
                        </div>
                    ) : (
                        <div className="max-w-4xl mx-auto">
                            <div className="glassmorphism rounded-2xl p-6 text-white mb-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-semibold">Cart Items</h2>
                                    <button 
                                        onClick={handleClearCart}
                                        className="text-red-400 hover:text-red-300 transition-colors"
                                    >
                                        <i className="fas fa-trash"></i> Clear Cart
                                    </button>
                                </div>
                                
                                {cartItems.map(item => (
                                    <div key={item.id} className="flex items-center justify-between py-4 border-b border-gray-600 last:border-b-0">
                                        <div className="flex items-center gap-4">
                                            <div className="dish-image w-16 h-16 rounded-lg"></div>
                                            <div>
                                                <h3 className="font-semibold">{item.name}</h3>
                                                <p className="text-yellow-400">${item.price}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-4">
                                            <div className="flex items-center gap-2">
                                                <button 
                                                    onClick={() => updateQuantity(item.id, item.quantity - 1)}
                                                    className="w-8 h-8 rounded-full bg-red-500 hover:bg-red-600 flex items-center justify-center transition-colors"
                                                >
                                                    <i className="fas fa-minus text-sm"></i>
                                                </button>
                                                <span className="w-8 text-center">{item.quantity}</span>
                                                <button 
                                                    onClick={() => updateQuantity(item.id, item.quantity + 1)}
                                                    className="w-8 h-8 rounded-full bg-green-500 hover:bg-green-600 flex items-center justify-center transition-colors"
                                                >
                                                    <i className="fas fa-plus text-sm"></i>
                                                </button>
                                            </div>
                                            
                                            <div className="text-right min-w-20">
                                                <p className="font-semibold">${(item.price * item.quantity).toFixed(2)}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="glassmorphism rounded-2xl p-6 text-white">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-2xl font-semibold">Total:</span>
                                    <span className="text-3xl font-bold text-yellow-400">${total.toFixed(2)}</span>
                                </div>
                                
                                <button 
                                    onClick={() => window.setCurrentPage('checkout')}
                                    className="w-full bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-700 hover:to-blue-700 text-white py-4 rounded-full text-lg font-semibold transition-all duration-300 transform hover:scale-105"
                                >
                                    Proceed to Checkout
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        const CheckoutPage = () => {
            const [address, setAddress] = useState('');
            const [loading, setLoading] = useState(false);
            const [user, setUserState] = useState(getUser());
            const cartItems = getCart();
            const total = getCartTotal();
            
            useEffect(() => {
                if (!user) {
                    window.setCurrentPage('profile');
                }
            }, [user]);
            
            const handleCheckout = async (e) => {
                e.preventDefault();
                
                if (!address.trim()) {
                    alert('Please enter your delivery address');
                    return;
                }
                
                if (cartItems.length === 0) {
                    alert('Your cart is empty');
                    return;
                }
                
                setLoading(true);
                
                try {
                    const response = await apiCall('/orders.php', {
                        method: 'POST',
                        body: JSON.stringify({ address })
                    });
                    
                    clearCart();
                    alert('Order placed successfully! Order ID: ' + response.order_id);
                    window.setCurrentPage('profile');
                } catch (error) {
                    alert('Error placing order: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };
            
            if (!user) {
                return (
                    <div className="container mx-auto px-4 py-8 pb-20">
                        <div className="glassmorphism rounded-2xl p-12 text-center text-white">
                            <h2 className="text-2xl font-semibold mb-4">Please Login</h2>
                            <p className="text-gray-300 mb-6">You need to be logged in to place an order</p>
                            <button 
                                onClick={() => window.setCurrentPage('profile')}
                                className="bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white px-6 py-3 rounded-full transition-all duration-300"
                            >
                                Go to Login
                            </button>
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="container mx-auto px-4 py-8 pb-20">
                    <h1 className="text-4xl font-bold text-center text-white mb-12 font-montserrat">
                        Checkout
                    </h1>
                    
                    <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">
                        {/* Order Summary */}
                        <div className="glassmorphism rounded-2xl p-6 text-white">
                            <h2 className="text-2xl font-semibold mb-6">Order Summary</h2>
                            
                            {cartItems.map(item => (
                                <div key={item.id} className="flex justify-between items-center py-2 border-b border-gray-600 last:border-b-0">
                                    <div>
                                        <span className="font-medium">{item.name}</span>
                                        <span className="text-gray-400 ml-2">x{item.quantity}</span>
                                    </div>
                                    <span>${(item.price * item.quantity).toFixed(2)}</span>
                                </div>
                            ))}
                            
                            <div className="border-t border-gray-600 pt-4 mt-4">
                                <div className="flex justify-between items-center text-xl font-bold">
                                    <span>Total:</span>
                                    <span className="text-yellow-400">${total.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                        
                        {/* Checkout Form */}
                        <div className="glassmorphism rounded-2xl p-6 text-white">
                            <h2 className="text-2xl font-semibold mb-6">Delivery Information</h2>
                            
                            <form onSubmit={handleCheckout}>
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-2">Customer Name</label>
                                    <input 
                                        type="text" 
                                        value={user.name}
                                        disabled
                                        className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white"
                                    />
                                </div>
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-2">Email</label>
                                    <input 
                                        type="email" 
                                        value={user.email}
                                        disabled
                                        className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white"
                                    />
                                </div>
                                
                                <div className="mb-6">
                                    <label className="block text-sm font-medium mb-2">Delivery Address *</label>
                                    <textarea 
                                        value={address}
                                        onChange={(e) => setAddress(e.target.value)}
                                        placeholder="Enter your complete delivery address..."
                                        rows="4"
                                        required
                                        className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:border-blue-500 focus:outline-none"
                                    ></textarea>
                                </div>
                                
                                <button 
                                    type="submit" 
                                    disabled={loading}
                                    className="w-full bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-700 hover:to-blue-700 disabled:opacity-50 text-white py-4 rounded-full text-lg font-semibold transition-all duration-300"
                                >
                                    {loading ? 'Placing Order...' : 'Place Order'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };
        
        const ProfilePage = () => {
            const [user, setUserState] = useState(getUser());
            const [isLoginMode, setIsLoginMode] = useState(true);
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                password: '',
                phone: '',
                address: ''
            });
            const [loading, setLoading] = useState(false);
            const [orders, setOrders] = useState([]);
            
            useEffect(() => {
                if (user) {
                    fetchProfile();
                }
            }, [user]);
            
            const fetchProfile = async () => {
                try {
                    const response = await apiCall('/auth.php?action=profile');
                    setUserState(response.user);
                    setUser(response.user);
                    setOrders(response.orders);
                } catch (error) {
                    console.error('Error fetching profile:', error);
                }
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                
                try {
                    const endpoint = isLoginMode ? '/auth.php?action=login' : '/auth.php?action=register';
                    const response = await apiCall(endpoint, {
                        method: 'POST',
                        body: JSON.stringify(formData)
                    });
                    
                    setToken(response.token);
                    setUser(response.user);
                    setUserState(response.user);
                    
                    if (!isLoginMode) {
                        alert('Registration successful!');
                    }
                    
                    fetchProfile();
                } catch (error) {
                    alert('Error: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };
            
            const handleLogout = () => {
                removeToken();
                removeUser();
                clearCart();
                setUserState(null);
                setFormData({
                    name: '',
                    email: '',
                    password: '',
                    phone: '',
                    address: ''
                });
            };
            
            if (!user) {
                return (
                    <div className="container mx-auto px-4 py-8 pb-20">
                        <div className="max-w-md mx-auto glassmorphism rounded-2xl p-8 text-white">
                            <h1 className="text-3xl font-bold text-center mb-8">
                                {isLoginMode ? 'Login' : 'Register'}
                            </h1>
                            
                            <form onSubmit={handleSubmit}>
                                {!isLoginMode && (
                                    <div className="mb-4">
                                        <label className="block text-sm font-medium mb-2">Name</label>
                                        <input 
                                            type="text" 
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            required={!isLoginMode}
                                            className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:border-blue-500 focus:outline-none"
                                        />
                                    </div>
                                )}
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-2">Email</label>
                                    <input 
                                        type="email" 
                                        value={formData.email}
                                        onChange={(e) => setFormData({...formData, email: e.target.value})}
                                        required
                                        className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:border-blue-500 focus:outline-none"
                                    />
                                </div>
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-2">Password</label>
                                    <input 
                                        type="password" 
                                        value={formData.password}
                                        onChange={(e) => setFormData({...formData, password: e.target.value})}
                                        required
                                        className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:border-blue-500 focus:outline-none"
                                    />
                                </div>
                                
                                {!isLoginMode && (
                                    <>
                                        <div className="mb-4">
                                            <label className="block text-sm font-medium mb-2">Phone</label>
                                            <input 
                                                type="tel" 
                                                value={formData.phone}
                                                onChange={(e) => setFormData({...formData, phone: e.target.value})}
                                                className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:border-blue-500 focus:outline-none"
                                            />
                                        </div>
                                        
                                        <div className="mb-6">
                                            <label className="block text-sm font-medium mb-2">Address</label>
                                            <textarea 
                                                value={formData.address}
                                                onChange={(e) => setFormData({...formData, address: e.target.value})}
                                                rows="3"
                                                className="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:border-blue-500 focus:outline-none"
                                            ></textarea>
                                        </div>
                                    </>
                                )}
                                
                                <button 
                                    type="submit" 
                                    disabled={loading}
                                    className="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 disabled:opacity-50 text-white py-3 rounded-full font-semibold transition-all duration-300 mb-4"
                                >
                                    {loading ? 'Please wait...' : (isLoginMode ? 'Login' : 'Register')}
                                </button>
                            </form>
                            
                            <div className="text-center">
                                <button 
                                    onClick={() => setIsLoginMode(!isLoginMode)}
                                    className="text-blue-400 hover:text-blue-300 transition-colors"
                                >
                                    {isLoginMode ? "Don't have an account? Register" : "Already have an account? Login"}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="container mx-auto px-4 py-8 pb-20">
                    <div className="max-w-4xl mx-auto">
                        <div className="glassmorphism rounded-2xl p-8 text-white mb-8">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-3xl font-bold">Profile</h1>
                                <button 
                                    onClick={handleLogout}
                                    className="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-full transition-colors"
                                >
                                    Logout
                                </button>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-6">
                                <div>
                                    <h3 className="text-lg font-semibold mb-4">Personal Information</h3>
                                    <p><strong>Name:</strong> {user.name}</p>
                                    <p><strong>Email:</strong> {user.email}</p>
                                    <p><strong>Phone:</strong> {user.phone || 'Not provided'}</p>
                                    <p><strong>Address:</strong> {user.address || 'Not provided'}</p>
                                </div>
                                
                                <div className="text-center">
                                    <div className="bg-gradient-to-br from-purple-500 to-blue-500 rounded-full w-32 h-32 mx-auto flex items-center justify-center mb-4">
                                        <i className="fas fa-user text-4xl text-white"></i>
                                    </div>
                                    <h2 className="text-xl font-semibold">Welcome back!</h2>
                                </div>
                            </div>
                        </div>
                        
                        {/* Order History */}
                        <div className="glassmorphism rounded-2xl p-8 text-white">
                            <h2 className="text-2xl font-bold mb-6">Order History</h2>
                            
                            {orders.length === 0 ? (
                                <p className="text-gray-400 text-center py-8">No orders yet. Start by browsing our menu!</p>
                            ) : (
                                <div className="space-y-4">
                                    {orders.map(order => (
                                        <div key={order.id} className="border border-gray-600 rounded-lg p-4">
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <h3 className="font-semibold">Order #{order.id}</h3>
                                                    <p className="text-sm text-gray-400">{new Date(order.created_at).toLocaleDateString()}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-bold text-yellow-400">${order.total}</p>
                                                    <span className={`px-2 py-1 rounded text-xs ${
                                                        order.status === 'pending' ? 'bg-yellow-600' :
                                                        order.status === 'accepted' ? 'bg-green-600' :
                                                        order.status === 'delivered' ? 'bg-blue-600' :
                                                        'bg-red-600'
                                                    }`}>
                                                        {order.status.toUpperCase()}
                                                    </span>
                                                </div>
                                            </div>
                                            <p className="text-sm text-gray-300">{order.items}</p>
                                            <p className="text-sm text-gray-400 mt-2"><strong>Address:</strong> {order.address}</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        
        const BottomNavbar = ({ currentPage, setCurrentPage, cartItemCount }) => {
            const navItems = [
                { id: 'home', icon: 'fas fa-home', label: 'Home' },
                { id: 'menu', icon: 'fas fa-utensils', label: 'Menu' },
                { id: 'cart', icon: 'fas fa-shopping-cart', label: 'Cart', badge: cartItemCount },
                { id: 'profile', icon: 'fas fa-user', label: 'Profile' }
            ];
            
            return (
                <div className="fixed bottom-0 left-0 right-0 glassmorphism-dark border-t border-gray-600 z-40">
                    <div className="flex justify-around items-center py-2">
                        {navItems.map(item => (
                            <button
                                key={item.id}
                                onClick={() => setCurrentPage(item.id)}
                                className={`nav-item flex flex-col items-center p-3 rounded-lg transition-all duration-300 relative ${
                                    currentPage === item.id ? 'text-blue-400' : 'text-gray-400 hover:text-white'
                                }`}
                            >
                                <i className={`${item.icon} text-xl mb-1`}></i>
                                <span className="text-xs font-medium">{item.label}</span>
                                {item.badge > 0 && (
                                    <span className="cart-badge absolute bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                        {item.badge}
                                    </span>
                                )}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };
        
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [cartItemCount, setCartItemCount] = useState(getCartItemCount());
            
            // Update cart count when cart changes
            useEffect(() => {
                const updateCartCount = () => {
                    setCartItemCount(getCartItemCount());
                };
                
                // Listen for storage changes
                window.addEventListener('storage', updateCartCount);
                
                // Check for cart updates periodically
                const interval = setInterval(updateCartCount, 1000);
                
                return () => {
                    window.removeEventListener('storage', updateCartCount);
                    clearInterval(interval);
                };
            }, []);
            
            // Make setCurrentPage available globally
            window.setCurrentPage = setCurrentPage;
            
            const renderPage = () => {
                switch (currentPage) {
                    case 'home':
                        return <HomePage />;
                    case 'menu':
                        return <MenuPage />;
                    case 'cart':
                        return <CartPage />;
                    case 'checkout':
                        return <CheckoutPage />;
                    case 'profile':
                        return <ProfilePage />;
                    default:
                        return <HomePage />;
                }
            };
            
            return (
                <div className="min-h-screen">
                    {renderPage()}
                    <BottomNavbar 
                        currentPage={currentPage} 
                        setCurrentPage={setCurrentPage}
                        cartItemCount={cartItemCount}
                    />
                </div>
            );
        };
        
        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
